name: Daily Library Reservation Automation

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        area:
          - name: "Lehrbuchsammlung EG und 1. OG"
            resource_url_path: "/resources/1-lehrbuchsammlung-eg-und-1-og/children"
            service_id: "449"

          - name: "Lesesaal Naturwissenschaften Empore"
            resource_url_path: "/resources/2-lesesaal-naturwissenschaften-2-og-und-empore-kopie-nnlimpvbvg/children"
            service_id: "2944"

          - name: "Lesesaal Naturwissenschaften"
            resource_url_path: "/resources/2-lesesaal-naturwissenschaften-2-og-und-empore/children"
            service_id: "452"

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SSO_PROVIDER: ${{ secrets.SSO_PROVIDER }}

          RESOURCE_URL_PATH: ${{ matrix.area.resource_url_path }}
          SERVICE_ID: ${{ matrix.area.service_id }}

          RESOURCE_IDS: ""
          USE_ANY_RESOURCE_ID: "True"
          BOOKING_TIMES: ${{ secrets.BOOKING_TIMES }}
        run: |
          echo "Trying area: ${{ matrix.area.name }}"

          for i in {1..20}; do
            echo "Attempt $i/20"
            OUTPUT=$(python main.py 2>&1)
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -Ei "successfully booked|booking successful|booked successfully|successfully reserved|reservation successful"; then
              echo "Booking succeeded, stopping retries."
              exit 0
            fi

            if [ "$i" -lt 20 ]; then
              echo "No booking yet. Waiting 2 seconds before retry..."
              sleep 2
            fi
          done

          echo "No booking succeeded after all retries."
