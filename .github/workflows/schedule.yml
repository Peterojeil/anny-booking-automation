name: Daily Library Reservation Automation

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SSO_PROVIDER: ${{ secrets.SSO_PROVIDER }}
          RESOURCE_URL_PATH: ${{ secrets.RESOURCE_URL_PATH }}
          SERVICE_ID: ${{ secrets.SERVICE_ID }}
          RESOURCE_IDS: ${{ secrets.RESOURCE_IDS }}
          USE_ANY_RESOURCE_ID: ${{ secrets.USE_ANY_RESOURCE_ID }}
          BOOKING_TIMES: ${{ secrets.BOOKING_TIMES }}
        run: |
          python main.py
